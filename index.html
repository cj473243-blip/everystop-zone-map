<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EveryStop Zone Selector</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',-apple-system,sans-serif;background:#FFFBF5;}
  #app{display:flex;flex-direction:column;height:100vh;}

  .header{
    padding:16px 20px;
    background:#FFFBF5;
    border-bottom:1px solid #F0DFC8;
  }
  .header h2{
    font-size:15px;font-weight:600;color:#2B1C0F;margin-bottom:4px;
  }
  .header p{font-size:12.5px;color:#8A7860;}

  #map{flex:1;z-index:1;}

  .footer{
    padding:14px 20px;
    background:#FFFBF5;
    border-top:1px solid #F0DFC8;
    display:flex;align-items:center;justify-content:space-between;gap:12px;
  }
  .selected-count{
    font-size:13px;color:#8A7860;
    flex:1;
  }
  .selected-count strong{color:#2B1C0F;}
  .btn-clear{
    background:transparent;
    border:1px solid #F0DFC8;
    color:#8A7860;
    padding:9px 16px;border-radius:6px;
    font-size:13px;font-weight:500;cursor:pointer;
    transition:all .15s;
  }
  .btn-clear:hover{border-color:#EF8606;color:#EF8606;}
  .btn-save{
    background:#EF8606;color:#FFFFFF;
    border:none;
    padding:10px 22px;border-radius:6px;
    font-size:13.5px;font-weight:600;cursor:pointer;
    transition:background .15s;
  }
  .btn-save:hover{background:#C96E04;}
  .btn-save:disabled{background:#D9C9B8;cursor:not-allowed;}

  /* Leaflet tooltip override */
  .zone-tooltip{
    background:#2B1C0F;
    color:#FFFBF5;
    border:none;
    border-radius:5px;
    padding:5px 10px;
    font-size:12px;
    font-weight:500;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
  }
  .zone-tooltip::before{border-top-color:#2B1C0F !important;}

  .leaflet-control-attribution{font-size:10px !important;}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h2>Select your driving areas</h2>
    <p>Tap zones on the map where you work or frequently drive. You can select multiple.</p>
  </div>

  <div id="map"></div>

  <div class="footer">
    <div class="selected-count">
      <strong id="count">0</strong> zones selected
    </div>
    <button class="btn-clear" onclick="clearAll()">Clear all</button>
    <button class="btn-save" id="saveBtn" onclick="saveZones()" disabled>Save preferences</button>
  </div>
</div>

// ── Layer setup ───────────────────────────────────────────────────────────────
function onEachFeature(feature, layer) {
  const name = feature.properties.name;
  layerMap[name] = layer;

  layer.bindTooltip(name, {
    className: 'zone-tooltip',
    sticky: true,
    direction: 'top',
    offset: [0, -4]
  });

  layer.on({
    mouseover(e) {
      if (!selectedZones.has(name)) {
        e.target.setStyle(styleHover);
      }
    },
    mouseout(e) {
      if (!selectedZones.has(name)) {
        e.target.setStyle(styleDefault);
      }
    },
    click(e) {
      toggleZone(name, e.target);
    }
  });
}

L.geoJSON(GEOJSON_DATA, {
  style: styleDefault,
  onEachFeature
}).addTo(map);




// ── Toggle zone ───────────────────────────────────────────────────────────────
function toggleZone(name, layer) {
  if (selectedZones.has(name)) {
    selectedZones.delete(name);
    layer.setStyle(styleDefault);
  } else {
    selectedZones.add(name);
    layer.setStyle(styleSelected);
  }
  updateUI();
}

function updateUI() {
  const count = selectedZones.size;
  document.getElementById('count').textContent = count;
  document.getElementById('saveBtn').disabled = count === 0;
}

function clearAll() {
  selectedZones.forEach(name => {
    if (layerMap[name]) layerMap[name].setStyle(styleDefault);
  });
  selectedZones.clear();
  updateUI();
}

// ── Save — sends data back to Bubble ──────────────────────────────────────────
function saveZones() {
  const zones = Array.from(selectedZones);
  const zonesStr = zones.join(',');


  if (window.parent && window.parent.postMessage) {
    window.parent.postMessage({
      type: 'zonesSelected',
      zones: zones,
      zonesString: zonesStr
    }, '*');
  }

  
  try {
    window.location.hash = encodeURIComponent(zonesStr);
  } catch(e) {}

  // Visual feedback
  const btn = document.getElementById('saveBtn');
  btn.textContent = '✓ Saved!';
  btn.style.background = '#2F9E5C';
  setTimeout(() => {
    btn.textContent = 'Save preferences';
    btn.style.background = '#EF8606';
  }, 2000);
}

// ── ───────────
function preselectZones(zonesArray) {
  zonesArray.forEach(name => {
    const layer = layerMap[name];
    if (layer) {
      selectedZones.add(name);
      layer.setStyle(styleSelected);
    }
  });
  updateUI();
}

// Listen for messages from Bubble to pre-select zones
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'preselectZones') {
    preselectZones(e.data.zones);
  }
});
</script>
